version: "3.9"
services:
  web:
    build: .
    # Map host 5001 → container 5001 (your Flask now listens on 5001)
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DGRAPH_URL: ${DGRAPH_URL}
      DGRAPH_API_TOKEN: ${DGRAPH_API_TOKEN}
    depends_on:
      - db

  db:
    image: postgres:14
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
